; Loki runtime configuration
; Edit this file to tune identity, network timing, plugins, and dragon AI behavior.

[device]
name=Loki
dragon_name=Loki
hostname=loki.local

[network]
dhcp_enabled=true
standalone_mode=false
announce_new_networks=true
preferred_ssid=
scan_interval_ms=15000
hop_interval_ms=4000
discovery_hold_ms=20000
web_ui_enabled=true

[web]
bind_address=0.0.0.0
port=8080

[plugins]
display=true
dragon_ai=true
network_state=true

[hardware]
test_tft=false
test_flash=false
test_eeprom=false
test_flipper=false

[display]
backend=framebuffer
framebuffer_device=/dev/fb1

[tool_wardrive]
enabled=true
name=Wardrive Journal
description=Passive Wi-Fi scan logging with GPS-ready placeholders for later hardware.
command=internal://wardrive

[tool_status]
enabled=true
name=Status Feed
description=Expose Loki runtime status and heartbeat data.
command=internal://status

[tool_loot]
enabled=true
name=Loot Journal
description=Track growth milestones, trophies, and future inventory.
command=internal://loot

[tool_gps]
enabled=true
name=GPS Console
description=Show live latitude, longitude, altitude, and GPS fix source when available.
command=internal://gps

[tool_peripherals]
enabled=true
name=Peripheral Console
description=Summarize attached display, GPS state, nearby Wi-Fi, and safe peripheral probe options.
command=internal://peripherals

[tool_usb]
enabled=true
name=USB Probe
description=List attached USB devices using the built-in USB probe.
command=internal://usb

[tool_i2c_probe]
enabled=true
name=I2C Probe
description=List detected I2C buses using the built-in I2C probe.
command=internal://i2c

[tool_uart_probe]
enabled=true
name=UART Probe
description=List detected UART-style device nodes using the built-in UART probe.
command=internal://uart

[tool_gpio_probe]
enabled=true
name=GPIO Probe
description=Inspect GPIO line metadata using the built-in GPIO probe.
command=internal://gpio

[tool_nmap_ping]
enabled=true
name=Nmap Ping Sweep
description=Validated nmap wrapper for host discovery. Edit the target query before enabling.
command=internal://nmap?target=127.0.0.1&mode=ping

[tool_custom_scan]
enabled=true
name=Custom Scan
description=Validated curated scan profile wrapper. Edit target and ports before enabling.
command=internal://custom_scan?target=127.0.0.1&profile=quick&ports=22,80

[tool_example_wifi]
enabled=true
name=WiFi Summary
description=Example extra tool section. Duplicate this block with a new [tool_*] name to add more tools.
command=iwgetid

[tool_nmap_sweep]
enabled=true
name=Nmap Sweep
description=Run nmap host and service sweep. Edit the target and ports before enabling.
command=nmap -Pn -sV -T4 --top-ports 50 -- 192.168.4.0/24

[tool_bettercap]
enabled=true
name=Bettercap Session
description=Launch bettercap with discovery modules. Requires bettercap installed and permissions.
command=bettercap -eval "net.probe on; net.show; wifi.recon on"

[tool_bettercap_api]
enabled=true
name=Bettercap REST Status
description=Query the local bettercap REST API (edit URL/token as needed).
command=curl -s http://127.0.0.1:8081/api/session

[tool_actions_idle]
enabled=true
name=Actions Idle
description=Run IDLE actions script.
command=python3 /opt/loki/actions/IDLE.py

[tool_actions_ftp]
enabled=true
name=Actions FTP Connector
description=FTP connector automation.
command=python3 /opt/loki/actions/ftp_connector.py

