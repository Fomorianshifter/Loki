[tool_nmap_basic]
enabled=true
name=Nmap Basic Scan
description=Common 1,000 TCP ports on default subnet.
command=nmap 192.168.1.0/24

[tool_nmap_ping_all]
enabled=true
name=Nmap Ping Scan
description=Ping sweep without port scan.
command=nmap -sn 192.168.1.0/24

[tool_nmap_port_range]
enabled=true
name=Nmap Port Range 1-100
description=Scan ports 1-100 on default subnet.
command=nmap -p 1-100 192.168.1.0/24

[tool_nmap_service]
enabled=true
name=Nmap Service Version
description=Detect services and versions.
command=nmap -sV 192.168.1.0/24

[tool_nmap_os]
enabled=true
name=Nmap OS Detect
description=Attempt OS fingerprinting.
command=nmap -O 192.168.1.0/24

[tool_nmap_aggressive]
enabled=true
name=Nmap Aggressive
description=OS, version, scripts, and traceroute.
command=nmap -A 192.168.1.0/24

[tool_nmap_all_ports]
enabled=true
name=Nmap All TCP Ports
description=Scan all 65,535 TCP ports.
command=nmap -p- 192.168.1.0/24

[tool_nmap_fast]
enabled=true
name=Nmap Fast Top 100
description=Scan top 100 common ports.
command=nmap -F 192.168.1.0/24

[tool_nmap_udp]
enabled=true
name=Nmap UDP
description=Scan UDP ports.
command=nmap -sU 192.168.1.0/24

[tool_nmap_multi]
enabled=true
name=Nmap Multi Target
description=Scan two sample hosts.
command=nmap 192.168.1.10 192.168.1.20

[tool_nmap_cidr]
enabled=true
name=Nmap CIDR Sweep
description=Subnet sweep default /24.
command=nmap 192.168.1.0/24

[tool_nmap_exclude]
enabled=true
name=Nmap Exclude Host
description=Exclude a host from sweep.
command=nmap 192.168.1.0/24 --exclude 192.168.1.1

[tool_nmap_save]
enabled=true
name=Nmap Save Output
description=Write normal/XML/output files.
command=nmap -oA /tmp/nmap_output 192.168.1.0/24

[tool_nmap_scripts_default]
enabled=true
name=Nmap Default Scripts
description=Run default NSE scripts.
command=nmap -sC 192.168.1.0/24

[tool_nmap_script_custom]
enabled=true
name=Nmap Script http-title
description=Run specific NSE script.
command=nmap --script=http-title 192.168.1.0/24

[tool_nmap_top_ports]
enabled=true
name=Nmap Top 50 Ports
description=Scan top 50 ports.
command=nmap --top-ports 50 192.168.1.0/24

[tool_nmap_no_dns]
enabled=true
name=Nmap No DNS
description=Skip reverse DNS for speed.
command=nmap -n 192.168.1.0/24

[tool_nmap_traceroute]
enabled=true
name=Nmap Traceroute
description=Perform traceroute during scan.
command=nmap --traceroute 192.168.1.0/24

[tool_nmap_vuln]
enabled=true
name=Nmap Vulnerability Scripts
description=Run NSE vuln category.
command=nmap --script vuln 192.168.1.0/24

[tool_nmap_decoy]
enabled=true
name=Nmap Decoy Scan
description=Use decoy IPs for obfuscation.
command=nmap -D 10.0.0.1,10.0.0.2 192.168.1.0/24

