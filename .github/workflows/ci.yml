name: Build

on:
  push:
  pull_request:

jobs:
  build:
    name: ARM Cross-Compile (Debug + Release)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ARM cross-compiler and kernel headers
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            gcc-arm-linux-gnueabihf \
            binutils-arm-linux-gnueabihf \
            linux-libc-dev-armhf-cross \
            make

      - name: Build DEBUG
        run: make DEBUG=1

      - name: Upload DEBUG artifact
        uses: actions/upload-artifact@v4
        with:
          name: loki_app-debug
          path: build/debug/loki_app
          if-no-files-found: error

      - name: Clean
        run: make clean

      - name: Build RELEASE
        run: make DEBUG=0

      - name: Upload RELEASE artifact
        uses: actions/upload-artifact@v4
        with:
          name: loki_app-release
          path: build/release/loki_app
          if-no-files-found: error
