name: Release – Publish ARM Binary

on:
  push:
    tags:
      - "v*"   # triggered by tags like v1.0.0, v2.1.3, etc.

permissions:
  contents: write   # required to create GitHub Releases

jobs:
  release:
    name: Build & publish release for ARM Linux (Orange Pi Zero 2W)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ARM cross-compiler
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-arm-linux-gnueabihf binutils-arm-linux-gnueabihf

      - name: Build release binary
        run: make DEBUG=0

      - name: Package binary
        run: |
          mkdir -p dist
          cp build/release/loki_app dist/loki_app-arm-linux-gnueabihf
          cd dist
          tar czf loki_app-${{ github.ref_name }}-arm-linux-gnueabihf.tar.gz \
              loki_app-arm-linux-gnueabihf

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Loki ${{ github.ref_name }}"
          body: |
            ## Loki ${{ github.ref_name }}

            ARM Linux binary for **Orange Pi Zero 2W** (armv7-a / cortex-a7).

            ### Installation

            ```bash
            # Download and extract the archive
            wget https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/loki_app-${{ github.ref_name }}-arm-linux-gnueabihf.tar.gz
            tar xzf loki_app-${{ github.ref_name }}-arm-linux-gnueabihf.tar.gz

            # Make executable and run
            chmod +x loki_app-arm-linux-gnueabihf
            sudo ./loki_app-arm-linux-gnueabihf
            ```
          files: |
            dist/loki_app-${{ github.ref_name }}-arm-linux-gnueabihf.tar.gz
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
