# =============================================================================
# Loki Master Configuration File
# File: loki_config.ini
# Location on SD card: /loki/loki_config.ini
# Schema version: 1
#
# This is the SINGLE source of truth for all Loki runtime behaviour.
# Hardware pin constants remain in config/board_config.h and config/pinout.h
# (compile-time only).  Everything else is controlled here.
#
# Format: INI-style sections and key=value pairs.
#         Lines starting with '#' or ';' are comments.
#         Inline comments are NOT supported.
#         Boolean values: true / false  (also accepted: 1 / 0, yes / no)
#
# Boot priority:
#   1. Compile-time defaults  (config_defaults.h)
#   2. EEPROM bootstrap flags (tiny, failsafe metadata only)
#   3. This file             (primary runtime config — highest priority)
#
# If this file is missing or corrupt the system falls back to EEPROM flags
# and then to compile-time defaults with a WARNING log message.
# =============================================================================


# =============================================================================
# [system] — global system behaviour
# =============================================================================
[system]

# startup_mode: normal | safe | demo
#   normal — full init, load plugins and programs
#   safe   — minimal init, no plugins, no AI, no programs
#   demo   — run built-in demo sequence and halt
startup_mode=normal

# log_level: debug | info | warn | error | critical
log_level=info

# safe_mode: force safe mode regardless of startup_mode (overrides all)
safe_mode=false


# =============================================================================
# [ai] — AI subsystem
# =============================================================================
[ai]

# enabled: master switch for all AI features
enabled=false

# model: AI model identifier (application-defined)
model=none

# max_tokens: maximum token budget per AI request
max_tokens=512


# =============================================================================
# [plugins] — optional compiled-in subsystems
#
# Plugins are compiled into the firmware.  This section enables/disables them
# and controls their startup order.
#
# Keys:
#   plugin<N>=<name>          — declare plugin N with the given name
#   plugin<N>_enabled=<bool>  — enable or disable plugin N
#   plugin<N>_order=<int>     — startup order (lower value starts first)
#
# Plugins are identified by name when calling plugin_registry_register()
# in application code.  The name MUST match exactly.
# =============================================================================
[plugins]

# Example: mood engine plugin
plugin0=mood_engine
plugin0_enabled=false
plugin0_order=10

# Example: Flipper bridge plugin
plugin1=flipper_bridge
plugin1_enabled=true
plugin1_order=20

# Example: credits display plugin
plugin2=credits_display
plugin2_enabled=false
plugin2_order=30


# =============================================================================
# [programs] — external programs Loki can launch from the SD card
#
# Keys:
#   program<N>=<name>              — declare program N with the given name
#   program<N>_path=<path>         — path to the executable on SD card
#   program<N>_enabled=<bool>      — enable or disable program N
#   program<N>_auto_start=<bool>   — launch automatically at startup
# =============================================================================
[programs]

# Example: credits vending program
program0=credits_vending
program0_path=/loki/programs/credits_vending
program0_enabled=true
program0_auto_start=false

# Example: AI assistant program
program1=ai_assistant
program1_path=/loki/programs/ai_assistant
program1_enabled=false
program1_auto_start=false


# =============================================================================
# [storage] — storage backend behaviour
# =============================================================================
[storage]

# sd_config_enabled: 1 = load this config file from SD, 0 = use defaults only
sd_config_enabled=true

# sd_mount_point: root path for all SD card files
sd_mount_point=/loki

# fallback_to_defaults: if SD config is missing/corrupt, use defaults (not safe mode)
fallback_to_defaults=true


# =============================================================================
# [hardware] — runtime hardware settings (board constants stay in board_config.h)
# =============================================================================
[hardware]

# These keys are informational / reserved for future HAL override support.
# Compile-time constants in board_config.h take precedence for now.
spi0_freq=40000000
spi1_freq=25000000
i2c_freq=100000


# =============================================================================
# [display] — TFT display settings
# =============================================================================
[display]

# brightness: 0–100 (percent)
brightness=80

# rotation: 0=Normal, 1=90°, 2=180°, 3=270°
rotation=0


# =============================================================================
# [flipper] — Flipper Zero UART communication
# =============================================================================
[flipper]

enabled=true
baud_rate=115200


# =============================================================================
# [mood] — mood / personality subsystem
# =============================================================================
[mood]

# enabled: turn mood engine on or off
enabled=false

# default_mood: initial mood state (neutral | happy | curious | cautious)
default_mood=neutral


# =============================================================================
# [safety] — safe mode and recovery behaviour
# =============================================================================
[safety]

# safe_mode_on_boot: always start in safe mode (overrides [system] startup_mode)
safe_mode_on_boot=false

# recovery_enabled: allow recovery from fatal errors without full reflash
recovery_enabled=true

# watchdog_timeout_s: hardware watchdog timeout in seconds (0 = disabled)
watchdog_timeout_s=30
